<!doctype html>
<html lang="en" data-print="true">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Osteóplus — case study (print)</title>
  <meta name="description" content="Print-ready Osteóplus UX case study: senior-friendly rehab PWA, guest-first booking, Daily Rehab Loop, WCAG 2.2 AA, bilingual ES/EN.">
  <meta name="author" content="Edgar Bonilla G.">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="icon" type="image/svg+xml" href="assets/logo-svg/favicon.svg">

  <link rel="stylesheet" href="assets/colors_and_type.css">
  <link rel="stylesheet" href="assets/case-study.css">

  <!-- Print overrides -->
  <style>
    /* -------- Always-on screen overrides for the print page -------- */
    html, body { background: #fff; }
    /* Hide all interactive chrome so the document reads as a flat report */
    .topbar,
    .topbar-progress,
    .floating-toc,
    .skip-link,
    .tweaks-panel,
    [data-edit-mode],
    .tweaks-fab,
    .tweaks-handle,
    .pivot-toggle {
      display: none !important;
    }
    /* Force light mode, regardless of how the app boots */
    html[data-theme="dark"] { color-scheme: light; }

    /* Always show both pivot cards at full opacity for print */
    .pivot-card.is-faded { opacity: 1 !important; }

    /* Snapshot side card should not be sticky in print */
    .snapshot { position: static !important; top: auto !important; }

    /* Print-safe colors */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    /* Slight breathing room on top since the topbar is hidden */
    main { padding-top: 8px; }

    /* -------- @media print rules -------- */
    @media print {
      @page {
        size: A4 portrait;
        margin: 12mm 12mm 14mm;
      }

      html, body {
        background: #fff !important;
        font-size: 11.5pt;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      :root {
        --section-y: 18mm;
        --gutter: 0;
        --content-w: 100%;
        --body-size: 11.5pt;
        --body-line: 1.5;
      }

      /* Disable smooth scroll & transitions */
      html { scroll-behavior: auto; }
      *, ::before, ::after {
        transition: none !important;
        animation: none !important;
        box-shadow: none !important;
      }

      /* Section breaks */
      .section,
      .hero {
        break-before: page;
        page-break-before: always;
        padding: 0 !important;
        max-width: 100% !important;
      }
      .hero { break-before: avoid; page-break-before: avoid; }

      /* Backgrounded sections lose tints since we are page-broken */
      .section-tldr, .section-solution, .section-credits { background: transparent !important; }
      .section-tldr > *, .section-solution > *, .section-credits > * {
        padding-left: 0 !important; padding-right: 0 !important;
        max-width: 100% !important;
      }

      /* ----- Hero ----- */
      .hero-split {
        grid-template-columns: 1.05fr 0.95fr !important;
        gap: 16mm !important;
        align-items: start !important;
      }
      .hero-title-lg { font-size: 28pt !important; line-height: 1.1 !important; }
      .hero-title-xl { font-size: 36pt !important; line-height: 1.05 !important; }
      .hero-thesis { font-size: 12pt !important; }
      .hero-right { min-height: 0 !important; height: 220mm !important; }
      .hero-meta { grid-template-columns: 1fr 1fr !important; gap: 8mm 14mm !important; }
      .hero-ctas { display: none !important; }

      /* ----- Section heads ----- */
      .section > header h2 { font-size: 22pt !important; line-height: 1.15 !important; }
      .section > header p  { font-size: 12pt !important; }

      /* ----- TL;DR + Snapshot ----- */
      .tldr-grid { grid-template-columns: 1.3fr 1fr !important; gap: 10mm !important; }
      .tldr-row { padding: 10pt 12pt !important; }
      .tldr-title { font-size: 12.5pt !important; }
      .tldr-body  { font-size: 10.5pt !important; }

      /* ----- Process timeline ----- */
      .process-timeline { margin: 10mm 0 12mm !important; gap: 6pt !important; }
      .process-label { font-size: 10.5pt !important; }
      .process-date  { font-size: 8.5pt !important; }
      .process-artifact { font-size: 8.5pt !important; }

      /* ----- Pivot ----- */
      .pivot { padding: 8mm !important; }
      .pivot-grid { grid-template-columns: 1fr 24pt 1fr !important; gap: 8pt !important; }
      .pivot-card { padding: 10pt !important; }
      .pivot-card h4 { font-size: 14pt !important; }
      .pivot-card p  { font-size: 10pt !important; }

      /* ----- Solution rows: one per page ----- */
      .solution-list { gap: 0 !important; margin-top: 6mm !important; }
      .solution-row {
        break-before: page;
        page-break-before: always;
        break-inside: avoid;
        page-break-inside: avoid;
        grid-template-columns: 1fr 1fr !important;
        gap: 14mm !important;
        padding: 10mm !important;
        margin: 0 !important;
      }
      .solution-row:first-child { break-before: avoid; page-break-before: avoid; }
      .solution-title { font-size: 18pt !important; }
      .solution-problem { font-size: 13pt !important; }
      .solution-decision { font-size: 11pt !important; }
      .solution-metric { font-size: 9.5pt !important; }

      /* ----- Accessibility ----- */
      .a11y-audit { gap: 4mm !important; margin: 8mm 0 10mm !important; }
      .audit-card { padding: 10pt !important; }
      .audit-value { font-size: 26pt !important; }
      .audit-label { font-size: 10pt !important; }
      .audit-sub   { font-size: 8.5pt !important; }
      .a11y-screen { grid-template-columns: 280px 1fr !important; gap: 10mm !important; margin-bottom: 12mm !important; }
      .a11y-specs li { font-size: 10.5pt !important; }
      .a11y-callouts { gap: 4mm !important; }
      .callout-title { font-size: 11pt !important; }
      .callout-body  { font-size: 9.5pt !important; }

      /* ----- Credits ----- */
      .demo-grid { gap: 4mm !important; }
      .demo-card { padding: 10pt !important; }
      .demo-title { font-size: 11pt !important; }
      .demo-body  { font-size: 9.5pt !important; }

      /* ----- Footer ----- */
      .case-footer {
        margin-top: 10mm !important;
        padding: 8mm !important;
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .footer-cta { display: none !important; }

      /* No clipping on overflow elements */
      .scr, .scr .content, .scr > div { overflow: visible !important; }
    }
  </style>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React + Babel
       Print preview only. Production Vercel port should precompile these assets per
       00-source-inventory/13-v2-to-production-publish-guide.md. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Data + components -->
  <script type="text/babel" src="assets/data.jsx"></script>
  <script type="text/babel" src="assets/phone-frame.jsx"></script>
  <script type="text/babel" src="assets/mockups-1.jsx"></script>
  <script type="text/babel" src="assets/mockups-2.jsx"></script>
  <script type="text/babel" src="assets/sections-1.jsx"></script>
  <script type="text/babel" src="assets/sections-2.jsx"></script>
  <script type="text/babel" src="assets/sections-3.jsx"></script>
  <script type="text/babel" src="assets/tweaks-panel.jsx"></script>
  <script type="text/babel" src="assets/app.jsx"></script>

  <!-- Auto-print: wait for fonts + JSX paint + extra delay so the IO counters settle -->
  <script type="text/babel">
    (async () => {
      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
      } catch (e) {}
      // Wait for React to mount Hero (the most expensive subtree)
      const waitFor = (sel, timeout = 6000) => new Promise((resolve) => {
        const start = Date.now();
        const tick = () => {
          if (document.querySelector(sel)) return resolve(true);
          if (Date.now() - start > timeout) return resolve(false);
          requestAnimationFrame(tick);
        };
        tick();
      });
      await waitFor("#solution .solution-row");
      // Manually scroll through the page once so IntersectionObserver-driven
      // animated counters fire and land on their final values.
      const total = document.documentElement.scrollHeight;
      for (let y = 0; y <= total; y += Math.max(200, window.innerHeight * 0.8)) {
        window.scrollTo(0, y);
        await new Promise(r => setTimeout(r, 80));
      }
      window.scrollTo(0, 0);
      // Give counters + Lucide a final settle window
      await new Promise(r => setTimeout(r, 1100));
      if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
      await new Promise(r => setTimeout(r, 500));
      window.print();
    })();
  </script>
</body>
</html>
